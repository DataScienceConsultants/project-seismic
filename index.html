<!-- Personal Status -->

<section
  class="status-card"
  id="statusCard"
  data-status="neutral"
  aria-labelledby="statusHeadline"
>
  <p class="eyebrow">
    <span id="statusBadge" aria-hidden="true">○</span>
    Your current status
  </p>

  <h2 id="statusHeadline">
    Checking current activity…
  </h2>

  <p id="statusSubtext">
    Loading earthquake data and determining what is closest to you.
  </p>

  <div class="status-metrics">
    <div class="metric">
      <span id="nearestMagnitude">--</span>
      <small>Magnitude</small>
    </div>

    <div class="metric">
      <span id="nearestDistance">--</span>
      <small>Distance</small>
    </div>

    <div class="metric">
      <span id="nearestTime">--</span>
      <small>Occurred</small>
    </div>
  </div>
</section>
