<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>EQ Tracker</title>
  <meta name="description" content="A calm, mobile-first earthquake awareness app." />
  <meta name="theme-color" content="#0B0B0D" />

  <link rel="manifest" href="../public/manifest.json" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <link rel="stylesheet" href="src/css/reset.css" />
  <link rel="stylesheet" href="src/css/variables.css" />
  <link rel="stylesheet" href="src/css/typography.css" />
  <link rel="stylesheet" href="src/css/layout.css" />
  <link rel="stylesheet" href="src/css/components.css" />
  <link rel="stylesheet" href="src/css/animations.css" />
  <link rel="stylesheet" href="src/css/map.css" />
</head>

<body>
  <main class="app-shell">
    <header class="app-header">
      <div>
        <p class="eyebrow">Live earthquake awareness</p>
        <h1>EQ Tracker</h1>
      </div>
      <button class="button button-secondary" id="locationButton" type="button">Use My Location</button>
    </header>

    <section class="status-card">
      <p class="eyebrow">Current status</p>
      <h2 id="statusHeadline">No significant activity nearby</h2>
      <p id="statusSubtext">Loading recent earthquake data from official sources.</p>

      <div class="status-metrics">
        <div class="metric"><span id="nearestMagnitude">--</span><small>Nearest</small></div>
        <div class="metric"><span id="nearestDistance">--</span><small>Distance</small></div>
        <div class="metric"><span id="totalEvents">--</span><small>Events</small></div>
      </div>
    </section>

    <section class="map-panel">
      <div id="map"></div>
    </section>

    <section class="bottom-sheet">
      <div class="sheet-handle"></div>

      <div class="sheet-header">
        <div>
          <p class="eyebrow">Recent activity</p>
          <h3>Earthquakes</h3>
        </div>
        <span id="lastUpdated">Updating...</span>
      </div>

      <div class="filters">
        <label>Time
          <select id="timeRange">
            <option value="hour">Last hour</option>
            <option value="day">Last 24 hours</option>
            <option value="week" selected>Last 7 days</option>
            <option value="month">Last 30 days</option>
          </select>
        </label>

        <label>Magnitude
          <select id="magnitudeFilter">
            <option value="0" selected>All</option>
            <option value="2.5">2.5+</option>
            <option value="4.5">4.5+</option>
            <option value="6">6.0+</option>
          </select>
        </label>
      </div>

      <div id="earthquakeList" class="earthquake-list"></div>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="src/js/app.js"></script>
</body>
</html>
